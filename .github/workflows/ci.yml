name: Interactive UI CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify-interactive-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check entrypoints
        run: |
          test -f index.html
          test -f task-list.html
          test -f login.html
          test -f metrics.html
          test -f styles.css
          test -f script.js
      - name: Check linked assets
        run: |
          grep -q 'href="./styles.css"' index.html
          grep -q 'src="./script.js"' index.html
          grep -q 'href="./styles.css"' task-list.html
          grep -q 'src="./script.js"' task-list.html
          grep -q 'href="./styles.css"' login.html
          grep -q 'src="./script.js"' login.html
          grep -q 'href="./styles.css"' metrics.html
          grep -q 'src="./script.js"' metrics.html
          grep -q 'data-testid="main-content"' index.html